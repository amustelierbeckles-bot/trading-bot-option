# =============================================================================
# NGINX CONFIGURATION - Producción con Cloudflare
# =============================================================================
# Este archivo configura Nginx como reverse proxy para el trading bot
# Optimizado para trabajar con Cloudflare (SSL/TLS terminado en Cloudflare)
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # ========================================================================
    # MIME Types y configuración base
    # ========================================================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ========================================================================
    # Logging Format (anonimizado para privacidad)
    # ========================================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time '
                    'cf_ip=$http_cf_connecting_ip '
                    'cf_country=$http_cf_ipcountry';

    access_log /var/log/nginx/access.log main;

    # ========================================================================
    # Performance
    # ========================================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Compresión Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # ========================================================================
    # Seguridad - Headers adicionales
    # ========================================================================
    # Estos headers se suman a los de Cloudflare
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # Ocultar versión de Nginx
    server_tokens off;

    # ========================================================================
    # Rate Limiting básico (backup si Cloudflare falla)
    # ========================================================================
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

    # ========================================================================
    # Upstream - Backend FastAPI
    # ========================================================================
    upstream api_backend {
        least_conn;
        server api:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ========================================================================
    # Configuración de servidores
    # ========================================================================
    include /etc/nginx/conf.d/*.conf;
}
