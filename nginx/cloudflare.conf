# =============================================================================
# CLOUDFLARE CONFIGURATION - Virtual Host
# =============================================================================
# Este archivo configura el sitio para recibir tráfico de Cloudflare
# Cloudflare maneja el SSL/TLS, Nginx recibe tráfico HTTP interno
# =============================================================================

# ============================================================================
# HTTP (Port 80) - Entrada desde Cloudflare
# ============================================================================
server {
    listen 80;
    server_name _;  # Aceptar cualquier dominio (Cloudflare valida)

    # Verificar que la petición viene de Cloudflare (opcional, alta seguridad)
    # Descomenta estas líneas si quieres bloquear acceso directo al IP:
    #
    # if ($http_cf_ray = "") {
    #     return 444;  # Cerrar conexión si no viene de Cloudflare
    # }

    # ========================================================================
    # Frontend - React App (estático)
    # ========================================================================
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;  # SPA routing

        # Cache estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # No cachear HTML (para actualizaciones)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ========================================================================
    # API - FastAPI Backend
    # ========================================================================
    location /api/ {
        # Rate limiting
        limit_req zone=api burst=20 nodelay;

        # Proxy a FastAPI
        proxy_pass http://api_backend;
        proxy_http_version 1.1;

        # Headers de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;  # IP real del usuario
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Headers de Cloudflare (útiles para logs)
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-IPCountry $http_cf_ipcountry;
        proxy_set_header CF-Ray $http_cf_ray;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # WebSocket support (si lo implementas en el futuro)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ========================================================================
    # Health Check Endpoint (para monitoreo)
    # ========================================================================
    location /health {
        proxy_pass http://api_backend/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;  # No loggear health checks
    }

    # ========================================================================
    # Bloquear acceso a archivos sensibles
    # ========================================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Bloquear archivos de configuración
    location ~* ^.+\.(env|config|ini|log|sh|sql)$ {
        deny all;
    }

    # ========================================================================
    # Logs
    # ========================================================================
    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log main;
}

