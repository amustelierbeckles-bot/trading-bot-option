services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-bot-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=trading_bot
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./logs:/var/log/trading-bot
      - ./backend:/app          # mount en vivo: cambios en server.py se reflejan sin rebuild
    command: ["python", "-m", "uvicorn", "server:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      - mongo
      - redis
    networks:
      - trading-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trading-bot-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api
    networks:
      - trading-network

  mongo:
    image: mongo:7
    container_name: trading-bot-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=trading_bot
    volumes:
      - mongo-data:/data/db
    networks:
      - trading-network

  redis:
    image: redis:7-alpine
    container_name: trading-bot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - trading-network

  mongo-express:
    image: mongo-express:latest
    container_name: trading-bot-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    depends_on:
      - mongo
    networks:
      - trading-network

networks:
  trading-network:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
